services:
  backend:
    build:
      context: ./app
    ports:
      - "8000:8000"
    environment:
      - FRONTEND_URL=http://localhost:3000

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend